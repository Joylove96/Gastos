<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0D0D0D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="JoyRegist">
<title>JoyRegist · JoyLovePets SpA</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./favicon.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#0D0D0D;--dark2:#151515;--card:#1E1E1E;--card2:#262626;
  --green:#00F084;--green2:#00C965;
  --txt:#FFFFFF;--txt2:#9A9A9A;--border:#2E2E2E;
  --red:#FF5C5C;--amber:#FFB020;
}
body{font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--dark);color:var(--txt);line-height:1.55;-webkit-font-smoothing:antialiased}
input,select,textarea{color-scheme:dark;font-family:inherit}
button{cursor:pointer;font-family:inherit}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#333;border-radius:4px}

.layout{display:flex;flex-direction:column;min-height:100vh}
.sidebar{width:260px;background:linear-gradient(180deg,#0D0D0D,#141414);border-right:1px solid var(--border);padding:24px 16px;display:flex;flex-direction:column;gap:24px;position:sticky;top:0;height:100vh;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;font-size:24px;font-weight:800;letter-spacing:-.8px}
.sidebar-sub{font-size:11px;color:var(--txt2);margin-top:2px;letter-spacing:.3px}
.snav{display:flex;flex-direction:column;gap:6px}
.nav-item{padding:12px 14px;border-radius:10px;background:transparent;border:none;color:var(--txt2);font-size:13px;font-weight:600;transition:all .25s;display:flex;align-items:center;gap:10px;text-transform:uppercase;letter-spacing:.5px;text-align:left;width:100%;position:relative}
.nav-item:hover{background:color-mix(in srgb, var(--green) 8%, transparent);color:var(--green)}
.nav-item.active{background:var(--green);color:#000}
.nav-badge{position:absolute;right:10px;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:100px;letter-spacing:0}
.nav-item.active .nav-badge{background:#000;color:var(--green)}

.main{flex:1;width:100%;max-width:900px;margin:0 auto;padding:28px;min-width:0;padding-bottom:100px;box-sizing:border-box}
.hdr-inner{width:100%;max-width:900px;margin:0 auto;display:flex;align-items:center;gap:10px}
h1{font-size:28px;font-weight:800;letter-spacing:-1px}
h2{font-size:22px;font-weight:700;letter-spacing:-.5px}
h3{font-size:16px;font-weight:700}
.sec-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt2);margin-bottom:12px}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px}
.hero{background:linear-gradient(135deg,var(--green),var(--green2));color:#000;padding:26px;border-radius:18px;margin-bottom:18px}
.hero-l{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.75}
.hero-a{font-size:clamp(34px,7vw,44px);font-weight:800;letter-spacing:-2px;line-height:1.1;margin-top:2px}
.hero-n{font-size:12px;font-weight:600;opacity:.7;margin-top:4px}

.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-l{font-size:10px;color:var(--txt2);font-weight:600;letter-spacing:.8px;text-transform:uppercase}
.stat-v{font-size:19px;font-weight:800;color:var(--green);margin-top:6px;letter-spacing:-.5px}
.stat-n{font-size:10px;color:var(--txt2);margin-top:3px}

.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.tab{padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--txt2);font-size:12px;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.tab:hover{border-color:var(--green);color:var(--green)}
.tab.active{background:var(--green);border-color:var(--green);color:#000}

.btn{padding:12px 20px;border-radius:9px;border:none;font-size:13px;font-weight:700;transition:all .25s;text-transform:uppercase;letter-spacing:.5px;-webkit-appearance:none;appearance:none}
.btn-p{background:var(--green);color:#000}
.btn-p:hover:not(:disabled){background:var(--green2)}
.btn-p:disabled{opacity:.35;cursor:default}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--txt2)}
.btn-g:hover{border-color:var(--green);color:var(--green)}
.btn-d{background:rgba(255,92,92,.12);color:var(--red);border:1px solid rgba(255,92,92,.25)}
.btn-d:hover{background:rgba(255,92,92,.2)}
.btn-dd{background:var(--red);color:#fff}
.btn-s{padding:8px 12px;font-size:11px}
.btn-full{width:100%}

.fld{margin-bottom:14px}
.lbl{display:block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt2);margin-bottom:6px}
.inp{width:100%;padding:11px 13px;background:var(--card2);border:1px solid var(--border);border-radius:9px;color:var(--txt);font-size:16px;outline:none;transition:all .2s}
.inp:focus{border-color:var(--green)}
select.inp option{background:var(--card2)}
textarea.inp{resize:vertical;min-height:70px;font-size:14px}

.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:7px 12px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--txt2);font-size:12px;font-weight:600;transition:all .2s;white-space:nowrap}
.chip:hover{border-color:var(--green);color:var(--green)}
.chip.active{background:var(--green);border-color:var(--green);color:#000;font-weight:700}

.tx{display:flex;align-items:center;gap:12px;padding:12px 8px;border-radius:10px;cursor:pointer;transition:background .15s;width:100%;background:none;border:none;text-align:left;color:inherit;border-bottom:1px solid var(--border)}
.tx:last-child{border-bottom:none}
.tx:hover{background:rgba(255,255,255,.03)}
.tx-ic{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tx-b{flex:1;min-width:0}
.tx-n{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-d{font-size:11.5px;color:var(--txt2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-r{text-align:right;flex-shrink:0}
.tx-a{font-size:14px;font-weight:700;letter-spacing:-.3px}
.tx-s{font-size:9px;color:var(--amber);text-transform:uppercase;font-weight:700;letter-spacing:.5px;margin-top:1px}
.tx-clip{font-size:10px;color:var(--txt2);margin-top:1px}

.ovl{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;animation:up .25s ease}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mt{font-size:18px;font-weight:800;letter-spacing:-.4px}
.mx{background:none;border:none;color:var(--txt2);font-size:20px;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.mx:hover{background:var(--card2);color:var(--green)}

.fab{position:fixed;bottom:26px;right:26px;width:58px;height:58px;border-radius:50%;background:var(--green);border:none;color:#000;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 32px color-mix(in srgb, var(--green) 35%, transparent);transition:transform .2s;z-index:50;padding-bottom:3px}
.fab:hover{transform:scale(1.08)}
.fab:active{transform:scale(.94)}

.empty{text-align:center;padding:40px 16px;color:var(--txt2)}
.empty-i{font-size:48px;margin-bottom:10px;opacity:.4}
.empty-t{font-size:13px;line-height:1.6}

.drop{border:2px dashed color-mix(in srgb, var(--green) 40%, transparent);border-radius:14px;padding:28px;text-align:center;cursor:pointer;transition:all .25s;background:color-mix(in srgb, var(--green) 3%, transparent)}
.drop:hover{background:color-mix(in srgb, var(--green) 8%, transparent);border-color:var(--green)}
.drop-i{font-size:38px;margin-bottom:8px}
.drop-t{color:var(--txt2);font-size:13px}

.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.dcard{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;transition:border-color .2s}
.dcard:hover{border-color:var(--green)}
.dc-i{font-size:28px;margin-bottom:6px}
.dc-n{font-size:11.5px;font-weight:600;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dc-m{font-size:10px;color:var(--txt2)}
.dc-th{width:100%;height:80px;object-fit:cover;border-radius:8px;margin-bottom:8px;background:#000}

.venc{display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--card2);margin-bottom:8px}
.venc.urgente{border-color:rgba(255,92,92,.5);background:rgba(255,92,92,.06)}
.venc.pronto{border-color:rgba(255,176,32,.4);background:rgba(255,176,32,.05)}
.venc.hecho{opacity:.45}
.venc-b{flex:1;min-width:0}
.venc-t{font-size:14px;font-weight:700}
.venc-d{font-size:11.5px;color:var(--txt2);margin-top:1px}
.venc-c{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:4px 9px;border-radius:100px;white-space:nowrap;flex-shrink:0}

.banner{border-radius:12px;padding:12px 14px;font-size:13px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start;line-height:1.5}
.banner-w{background:rgba(255,176,32,.08);border:1px solid rgba(255,176,32,.3);color:#FFD08A}
.banner-e{background:rgba(255,92,92,.08);border:1px solid rgba(255,92,92,.3);color:#FFAFAF}
.banner-i{background:color-mix(in srgb, var(--green) 6%, transparent);border:1px solid color-mix(in srgb, var(--green) 25%, transparent);color:#8FF0C4}

.kv{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13.5px}
.kv:last-child{border-bottom:none}
.kv-k{color:var(--txt2);flex-shrink:0}
.kv-v{text-align:right;font-weight:600;word-break:break-word}

.av{border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--card2)}
.av-b{border:2px solid var(--border)}
.perfil-row{display:flex;align-items:center;gap:10px;padding:10px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid var(--border)}
.perfil-n{font-size:13px;font-weight:700;line-height:1.2}
.perfil-m{font-size:11px;color:var(--txt2)}
.pick{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pick-c{background:var(--card2);border:2px solid var(--border);border-radius:16px;padding:18px 12px;text-align:center;transition:all .25s;cursor:pointer}
.pick-c:hover{border-color:var(--green)}
.pick-c.on{border-color:var(--green);background:color-mix(in srgb, var(--green) 7%, transparent)}
.pick-n{font-size:15px;font-weight:800;margin-top:10px}
.pick-m{font-size:11.5px;color:var(--txt2);margin-top:1px}

.nota{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:12px;padding:14px;margin-bottom:10px;transition:all .2s}
.nota.done{opacity:.5}
.nota.done .nota-t{text-decoration:line-through}
.nota-h{display:flex;align-items:flex-start;gap:10px}
.nota-t{flex:1;font-size:14px;line-height:1.55;white-space:pre-wrap;word-break:break-word;min-width:0}
.nota-f{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.nota-tag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:3px 8px;border-radius:100px}
.nota-meta{font-size:10.5px;color:var(--txt2);display:flex;align-items:center;gap:5px;margin-left:auto}

.chart{position:relative;height:290px}.spin{width:22px;height:22px;border:3px solid color-mix(in srgb, var(--green) 25%, transparent);border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite;display:inline-block;vertical-align:middle}@keyframes sp{to{transform:rotate(360deg)}}
video{width:100%;border-radius:12px;display:block;background:#000}

.sw{position:relative;display:inline-block;width:42px;height:24px;flex-shrink:0}.sw input{opacity:0;width:0;height:0}
.sw-s{position:absolute;cursor:pointer;inset:0;background:var(--card2);border:1px solid var(--border);transition:.25s;border-radius:24px}
.sw-s:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:var(--txt2);transition:.25s;border-radius:50%}
.sw input:checked + .sw-s{background:var(--green);border-color:var(--green)}
.sw input:checked + .sw-s:before{transform:translateX(18px);background:#000}
.swrow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.swrow:last-child{border-bottom:none}
.swrow-t{font-size:13.5px;font-weight:600}
.swrow-d{font-size:11.5px;color:var(--txt2);margin-top:1px}

@media(max-width:820px){
  .layout{flex-direction:column}
  .sidebar{width:100%;height:auto;position:sticky;top:0;z-index:30;flex-direction:column;padding:12px;gap:10px;border-right:none;border-bottom:1px solid var(--border)}
  .snav{flex-direction:row;overflow-x:auto;padding-bottom:2px}
  .nav-item{white-space:nowrap;padding:9px 12px;font-size:11px}
  .nav-badge{position:static;margin-left:4px}
  .sidebar-foot{display:none!important}
  .main{padding:16px;padding-bottom:100px}
  .grid3{grid-template-columns:1fr;gap:10px}
  .stat{display:flex;justify-content:space-between;align-items:center;text-align:left;padding:14px}
  .stat-v{margin-top:0}
  .fab{bottom:20px;right:20px}
}
</style>
</head>
<body>
<div id="root"></div>
<div id="ipmt" style="display:none;position:fixed;left:16px;right:16px;bottom:96px;z-index:80;background:#00F084;color:#000;border-radius:14px;padding:14px 16px;box-shadow:0 12px 36px rgba(0,240,132,.35);align-items:center;gap:12px;font-family:'Plus Jakarta Sans',sans-serif">
  <div style="flex:1;min-width:0">
    <div style="font-weight:800;font-size:14px">Instalar en tu teléfono</div>
    <div style="font-size:12px;opacity:.75">Se abre como app, funciona sin internet</div>
  </div>
  <button id="ipbtn" style="background:#000;color:#00F084;border:none;border-radius:9px;padding:10px 16px;font-weight:800;font-size:12px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;font-family:inherit;flex-shrink:0">Instalar</button>
  <button id="ipx" style="background:none;border:none;color:#000;font-size:18px;cursor:pointer;opacity:.5;padding:0 4px">&times;</button>
</div>
<script>
(function () {
  var dif = null;
  var box = document.getElementById("ipmt");
  var btn = document.getElementById("ipbtn");
  var cerrar = document.getElementById("ipx");

  window.addEventListener("beforeinstallprompt", function (e) {
    e.preventDefault();
    dif = e;
    if (localStorage.getItem("ip-oculto") !== "1") box.style.display = "flex";
  });

  btn.addEventListener("click", function () {
    if (!dif) return;
    dif.prompt();
    dif.userChoice.then(function () { box.style.display = "none"; dif = null; });
  });

  cerrar.addEventListener("click", function () {
    box.style.display = "none";
    localStorage.setItem("ip-oculto", "1");
  });

  window.addEventListener("appinstalled", function () { box.style.display = "none"; });
})();
</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="./app.js"></script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./sw.js").catch(function (e) {
      console.warn("SW no registrado:", e);
    });
  });
}
</script>
</body>
</html>
